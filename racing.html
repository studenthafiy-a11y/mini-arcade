<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Racer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #111; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; position: relative; }
        #game-wrap { position: relative; width: 100%; max-width: 450px; height: 75vh; background: #333; border: 4px solid #555; }
        canvas { width: 100%; height: 100%; display: block; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
        button { padding: 12px 24px; font-size: 18px; font-weight:bold; background:#00e5ff; color:#000; border:none; border-radius:4px; cursor:pointer; margin-top: 10px; }
        #ui { position: absolute; top: 10px; left: 15px; font-size: 18px; font-weight: bold; color: #fff; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        #controls { width: 100%; max-width: 450px; display: flex; justify-content: space-between; padding: 10px; background: #222; }
        .btn { flex: 1; height: 70px; background: #444; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 30px; font-weight: bold; color:#fff; margin: 0 5px; }
        .btn:active { background: #00e5ff; color:#000; }
    </style>
</head>
<body>

    <a href="index.html" style="position: absolute; top: 10px; right: 10px; background: #00e5ff; color: #000; padding: 8px 12px; text-decoration: none; font-weight: bold; border-radius: 5px; z-index: 1000;">⬅ MENU</a>

    <div id="game-wrap">
        <div id="ui">SCORE: <span id="score">0</span><br>GEAR: <span id="level">1</span></div>
        <canvas id="game"></canvas>
        <div id="overlay">
            <h1 id="msg" style="color:#00e5ff; margin-bottom:10px;">NEON RACER</h1>
            <button id="btn-start">START ENGINE</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-right">▶</div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 300; canvas.height = 500;

    let player, traffic, roadOffset = 0;
    let score = 0, level = 1, baseSpeed = 4, running = false, frameCount = 0;
    let keys = { left: false, right: false };

    let audioCtx = null;
    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playSfx(type) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        let now = audioCtx.currentTime;
        o.connect(g); g.connect(audioCtx.destination);
        if (type === 'pass') {
            o.type = 'sine'; o.frequency.setValueAtTime(800, now); o.frequency.linearRampToValueAtTime(1200, now + 0.1);
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.01, now + 0.1);
            o.start(now); o.stop(now + 0.1);
        } else if (type === 'crash') {
            o.type = 'sawtooth'; o.frequency.setValueAtTime(100, now); o.frequency.exponentialRampToValueAtTime(20, now + 0.4);
            g.gain.setValueAtTime(0.3, now); g.gain.linearRampToValueAtTime(0.01, now + 0.4);
            o.start(now); o.stop(now + 0.4);
        } else if (type === 'level') {
            o.type = 'square'; o.frequency.setValueAtTime(523, now); o.frequency.setValueAtTime(659, now + 0.1); o.frequency.setValueAtTime(783, now + 0.2);
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.01, now + 0.4);
            o.start(now); o.stop(now + 0.4);
        }
    }

    class Car {
        constructor(x, y, color, isPlayer = false) {
            this.w = 30; this.h = 50; this.x = x; this.y = y;
            this.color = color; this.isPlayer = isPlayer; this.passed = false;
        }
        draw() {
            ctx.fillStyle = this.color; ctx.fillRect(this.x, this.y, this.w, this.h);
            ctx.fillStyle = '#000'; // Windows
            ctx.fillRect(this.x + 5, this.y + 10, this.w - 10, 10);
            ctx.fillRect(this.x + 5, this.y + 35, this.w - 10, 10);
        }
    }

    function initGame() {
        initAudio(); 
        player = new Car(canvas.width / 2 - 15, canvas.height - 80, '#00e5ff', true);
        traffic = []; score = 0; level = 1; baseSpeed = 4; frameCount = 0; running = true;
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
        document.getElementById('overlay').style.display = 'none';
        loop();
    }

    function update() {
        frameCount++; roadOffset += baseSpeed; if (roadOffset > 40) roadOffset = 0;

        if (keys.left) player.x -= 4;
        if (keys.right) player.x += 4;
        if (player.x < 10) player.x = 10;
        if (player.x > canvas.width - player.w - 10) player.x = canvas.width - player.w - 10;

        let spawnRate = Math.max(20, 70 - (level * 5));
        if (frameCount % spawnRate === 0) {
            let laneX = 10 + Math.random() * (canvas.width - 50);
            traffic.push(new Car(laneX, -60, '#ff1744'));
        }

        for (let i = traffic.length - 1; i >= 0; i--) {
            let t = traffic[i]; t.y += baseSpeed * 0.8;
            
            // Collision Check
            if (player.x < t.x + t.w && player.x + player.w > t.x && player.y < t.y + t.h && player.y + player.h > t.y) {
                playSfx('crash'); running = false; 
                document.getElementById('msg').innerText = "CRASHED!";
                document.getElementById('overlay').style.display = 'flex';
                return;
            }

            if (!t.passed && t.y > player.y + player.h) {
                t.passed = true; score++; playSfx('pass');
                document.getElementById('score').innerText = score;
                if (score % 10 === 0) { level++; baseSpeed += 1.5; playSfx('level'); document.getElementById('level').innerText = level; }
            }

            if (t.y > canvas.height) traffic.splice(i, 1);
        }
    }

    function draw() {
        ctx.fillStyle = '#333'; ctx.fillRect(0, 0, canvas.width, canvas.height); // Asphalt
        ctx.fillStyle = '#fff';
        for(let i = -1; i < canvas.height / 40 + 1; i++) {
            ctx.fillRect(canvas.width / 2 - 2, i * 40 + roadOffset, 4, 20); // Center line
        }
        ctx.fillStyle = '#999'; ctx.fillRect(0,0,10,canvas.height); ctx.fillRect(canvas.width-10,0,10,canvas.height); // Shoulders
        
        traffic.forEach(t => t.draw());
        player.draw();
    }

    function loop() { if (!running) return; update(); draw(); requestAnimationFrame(loop); }

    const bindControl = (id, key, state) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = state; });
        el.addEventListener('touchend', e => { e.preventDefault(); keys[key] = !state; });
        el.addEventListener('mousedown', e => { keys[key] = state; });
        el.addEventListener('mouseup', e => { keys[key] = !state; });
    };
    bindControl('btn-left', 'left', true); bindControl('btn-right', 'right', true);

    document.getElementById('btn-start').addEventListener('click', initGame);
    document.getElementById('btn-start').addEventListener('touchstart', e => { e.preventDefault(); initGame(); });

    document.addEventListener('keydown', e => {
        if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
        if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
    });
    document.addEventListener('keyup', e => {
        if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
        if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });
</script>
</body>
</html>
