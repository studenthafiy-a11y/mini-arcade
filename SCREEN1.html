<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mini Arcade Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            background: #0a0a12;
            background-image: 
                radial-gradient(rgba(18, 18, 32, 0.8), #05050a),
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 100% 100%, 20px 20px, 20px 20px;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* Neon Header Animation */
        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-align: center;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #ff0055,
                0 0 20px #ff0055,
                0 0 40px #ff0055;
            animation: flicker 2s infinite alternate;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 0 0 4px #fff, 0 0 11px #ff0055, 0 0 19px #ff0055, 0 0 40px #ff0055;
            }
            20%, 24%, 55% {        
                text-shadow: none;
            }
        }

        /* Menu Container */
        .menu-container {
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Arcade Buttons */
        .arcade-btn {
            position: relative;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            border: 2px solid transparent;
            overflow: hidden;
        }

        .arcade-btn::after {
            content: '';
            position: absolute;
            top: 0; left: -50%; width: 200%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.1), transparent);
            transform: skewX(-25deg);
            transition: 0.75s;
        }

        .arcade-btn:active::after {
            left: 125%;
        }

        /* Game Specific Themes */
        .tetris {
            background: linear-gradient(135deg, #00d2ff 0%, #0066ff 100%);
            color: #fff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        .tetris:active {
            transform: scale(0.96);
            box-shadow: 0 0 25px rgba(0, 210, 255, 0.8);
        }

        .mario {
            background: linear-gradient(135deg, #ff3d00 0%, #c40000 100%);
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 61, 0, 0.4);
        }
        .mario:active {
            transform: scale(0.96);
            box-shadow: 0 0 25px rgba(255, 61, 0, 0.8);
        }

        .pong {
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
            color: #fff;
            box-shadow: 0 0 15px rgba(76, 175, 80, 0.4);
        }
        .pong:active {
            transform: scale(0.96);
            box-shadow: 0 0 25px rgba(76, 175, 80, 0.8);
        }

        /* Footer Info */
        .footer {
            margin-top: 50px;
            font-size: 0.8rem;
            color: #444466;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <h1>Mini Arcade</h1>

    <div class="menu-container">
        <a href="tetris.html" class="arcade-btn tetris">🕹️ Tetris Pro</a>
        <a href="mario.html" class="arcade-btn mario">🍄 Super Runner</a>
        <a href="pong.html" class="arcade-btn pong">🏓 Ping Pong AI</a>
    </div>

    <div class="footer">v1.0.0 • Mobile Canvas Edition</div>

</body>
</html>
