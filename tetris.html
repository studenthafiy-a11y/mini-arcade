<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; overflow: hidden; touch-action: none; }
        #header { width: 100%; padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #222; border-bottom: 2px solid #333; }
        .score-box { text-align: center; font-size: 14px; }
        .score-val { font-size: 18px; font-weight: bold; color: #00E5FF; }
        #game-container { display: flex; flex: 1; width: 100%; max-width: 400px; position: relative; justify-content: center; align-items: center; padding: 10px; }
        canvas { background: #000; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.8); max-height: 50vh; aspect-ratio: 1/2; }
        #menu-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        h1 { color: #00E5FF; margin-bottom: 20px; font-size: 28px; }
        label { margin-bottom: 10px; font-size: 16px; }
        select, button { padding: 10px 20px; font-size: 16px; border: none; border-radius: 5px; margin-bottom: 15px; background: #333; color: #fff; }
        button { background: #00E5FF; color: #000; font-weight: bold; cursor: pointer; }
        #controls { width: 100%; max-width: 400px; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 10px; background: #222; }
        .btn { background: #333; border: 1px solid #444; border-radius: 8px; height: 55px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #fff; font-weight: bold; active-background: #555; }
        .btn:active { background: #00E5FF; color: #000; }
    </style>
</head>
<body>

    <div id="header">
        <div class="score-box">SCORE<br><span id="score" class="score-val">0</span></div>
        <div class="score-box">LINES<br><span id="lines" class="score-val">0</span></div>
        <div class="score-box">LEVEL<br><span id="level" class="score-val">1</span></div>
        <div class="score-box">HI-SCORE<br><span id="hi-score" class="score-val">0</span></div>
        <button id="btn-pause" style="margin:0; padding:5px 10px; font-size:12px;">PAUSE</button>
    </div>

    <div id="game-container">
        <canvas id="tetris"></canvas>
        <div id="menu-overlay">
            <h1 id="menu-title">TETRIS PRO</h1>
            <label id="lbl-start-lvl" for="start-level">Starting Level:</label>
            <select id="start-level">
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="5">5</option><option value="8">8</option><option value="10">10</option>
            </select>
            <button id="btn-start">START GAME</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn" id="ctrl-left">◀</div>
        <div class="btn" id="ctrl-rotate">🔄</div>
        <div class="btn" id="ctrl-right">▶</div>
        <div class="btn" id="ctrl-drop">▼</div>
        <div class="btn" id="ctrl-drop-hard">⏬</div>
    </div>

<script>
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const linesEl = document.getElementById('lines');
    const levelEl = document.getElementById('level');
    const hiScoreEl = document.getElementById('hi-score');
    const startBtn = document.getElementById('btn-start');
    const pauseBtn = document.getElementById('btn-pause');
    const menuOverlay = document.getElementById('menu-overlay');
    const menuTitle = document.getElementById('menu-title');
    const startLvlSelect = document.getElementById('start-level');

    const ROW = 20, COL = 10;
    let SQ = 0;
    let board = [];
    let score = 0, lines = 0, level = 1, hiScore = localStorage.getItem('tetris_hi') || 0;
    let gameOver = false, isPaused = false;
    let dropStart = Date.now(), dropInterval = 1000;
    let currentPiece;

    hiScoreEl.innerText = hiScore;

    const SHAPES = [
        [[1,1,1,1]], // I
        [[1,1,1],[0,1,0]], // T
        [[1,1,1],[1,0,0]], // L
        [[1,1,1],[0,0,1]], // J
        [[0,1,1],[1,1,0]], // S
        [[1,1,0],[0,1,1]], // Z
        [[1,1],[1,1]]        // O
    ];
    const COLORS = ["#00E5FF", "#9C27B0", "#FF9800", "#3F51B5", "#4CAF50", "#F44336", "#FFEB3B"];

    function resizeCanvas() {
        const containerHeight = document.getElementById('game-container').clientHeight;
        canvas.height = containerHeight - 20;
        canvas.width = canvas.height / 2;
        SQ = canvas.width / COL;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function createBoard() {
        board = Array.from({length: ROW}, () => Array(COL).fill(0));
    }

    function drawSquare(x, y, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * SQ, y * SQ, SQ, SQ);
        ctx.strokeStyle = "#111";
        ctx.strokeRect(x * SQ, y * SQ, SQ, SQ);
    }

    function drawBoard() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(let r=0; r<ROW; r++) {
            for(let c=0; c<COL; c++) {
                drawSquare(c, r, board[r][c] || "#050505");
            }
        }
    }

    class Piece {
        constructor(shape, color) {
            this.shape = shape;
            this.color = color;
            this.x = 3;
            this.y = -shape.length;
        }
        fill(color) {
            for(let r=0; r<this.shape.length; r++) {
                for(let c=0; c<this.shape[r].length; c++) {
                    if(this.shape[r][c] && (this.y + r) >= 0) drawSquare(this.x + c, this.y + r, color);
                }
            }
        }
        draw() { this.fill(this.color); }
        unDraw() { this.fill("#050505"); }
        moveLeft() { this.unDraw(); if(!this.collision(-1, 0, this.shape)) this.x--; this.draw(); }
        moveRight() { this.unDraw(); if(!this.collision(1, 0, this.shape)) this.x++; this.draw(); }
        rotate() {
            this.unDraw();
            let nextShape = this.shape[0].map((_, i) => this.shape.map(row => row[i])).reverse();
            if(!this.collision(0, 0, nextShape)) this.shape = nextShape;
            this.draw();
        }
        moveDown() {
            if(gameOver || isPaused) return;
            this.unDraw();
            if(!this.collision(0, 1, this.shape)) { this.y++; this.draw(); } 
            else { this.lock(); }
        }
        hardDrop() {
            this.unDraw();
            while(!this.collision(0, 1, this.shape)) { this.y++; }
            this.lock();
        }
        collision(xOffset, yOffset, futureShape) {
            for(let r=0; r<futureShape.length; r++) {
                for(let c=0; c<futureShape[r].length; c++) {
                    if(!futureShape[r][c]) continue;
                    let newX = this.x + c + xOffset;
                    let newY = this.y + r + yOffset;
                    if(newX < 0 || newX >= COL || newY >= ROW) return true;
                    if(newY < 0) continue;
                    if(board[newY][newX]) return true;
                }
            }
            return false;
        }
        lock() {
            for(let r=0; r<this.shape.length; r++) {
                for(let c=0; c<this.shape[r].length; c++) {
                    if(!this.shape[r][c]) continue;
                    if(this.y + r < 0) {
                        gameOver = true;
                        endGame();
                        return;
                    }
                    board[this.y + r][this.x + c] = this.color;
                }
            }
            clearLines();
            drawBoard();
            currentPiece = randomPiece();
        }
    }

    function randomPiece() {
        let r = Math.floor(Math.random() * SHAPES.length);
        return new Piece(SHAPES[r], COLORS[r]);
    }

    function clearLines() {
        let linesClearedNow = 0;
        for(let r=ROW-1; r>=0; r--) {
            if(board[r].every(val => val !== 0)) {
                board.splice(r, 1);
                board.unshift(Array(COL).fill(0));
                linesClearedNow++;
                r++; 
            }
        }
        if(linesClearedNow > 0) {
            lines += linesClearedNow;
            score += [0, 40, 100, 300, 1200][linesClearedNow] * level;
            level = Math.floor(lines / 10) + parseInt(startLvlSelect.value);
            dropInterval = Math.max(100, 1000 - (level * 85));
            updateUI();
        }
    }

    function updateUI() {
        scoreEl.innerText = score;
        linesEl.innerText = lines;
        levelEl.innerText = level;
        if(score > hiScore) {
            hiScore = score;
            localStorage.setItem('tetris_hi', hiScore);
            hiScoreEl.innerText = hiScore;
        }
    }

    function loop() {
        if(gameOver || isPaused) return;
        let now = Date.now();
        if(now - dropStart > dropInterval) {
            currentPiece.moveDown();
            dropStart = now;
        }
        requestAnimationFrame(loop);
    }

    function initGame() {
        createBoard();
        gameOver = false; isPaused = false;
        score = 0; lines = 0; level = parseInt(startLvlSelect.value);
        dropInterval = Math.max(100, 1000 - (level * 85));
        updateUI();
        menuOverlay.style.display = 'none';
        pauseBtn.innerText = "PAUSE";
        resizeCanvas();
        drawBoard();
        currentPiece = randomPiece();
        currentPiece.draw();
        dropStart = Date.now();
        loop();
    }

    function endGame() {
        menuTitle.innerText = "GAME OVER";
        document.getElementById('lbl-start-lvl').style.display = 'block';
        startLvlSelect.style.display = 'block';
        startBtn.innerText = "RESTART";
        menuOverlay.style.display = 'flex';
    }

    startBtn.addEventListener('click', initGame);
    pauseBtn.addEventListener('click', () => {
        if(gameOver) return;
        isPaused = !isPaused;
        pauseBtn.innerText = isPaused ? "RESUME" : "PAUSE";
        if(!isPaused) { dropStart = Date.now(); loop(); }
    });

    // Touch Event Wire-up
    document.getElementById('ctrl-left').addEventListener('touchstart', (e) => { e.preventDefault(); currentPiece.moveLeft(); });
    document.getElementById('ctrl-right').addEventListener('touchstart', (e) => { e.preventDefault(); currentPiece.moveRight(); });
    document.getElementById('ctrl-rotate').addEventListener('touchstart', (e) => { e.preventDefault(); currentPiece.rotate(); });
    document.getElementById('ctrl-drop').addEventListener('touchstart', (e) => { e.preventDefault(); currentPiece.moveDown(); });
    document.getElementById('ctrl-drop-hard').addEventListener('touchstart', (e) => { e.preventDefault(); currentPiece.hardDrop(); });

    // Keyboard controls fallback
    document.addEventListener('keydown', (e) => {
        if(gameOver || isPaused) return;
        if(e.key === "ArrowLeft") currentPiece.moveLeft();
        else if(e.key === "ArrowUp") currentPiece.rotate();
        else if(e.key === "ArrowRight") currentPiece.moveRight();
        else if(e.key === "ArrowDown") currentPiece.moveDown();
        else if(e.key === " ") currentPiece.hardDrop();
    });
</script>
</body>
</html>
