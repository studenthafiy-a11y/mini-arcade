<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Arcade Pong</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #111; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #wrapper { position: relative; width: 100%; max-width: 600px; aspect-ratio: 4/3; }
        canvas { width: 100%; height: 100%; display: block; background: #000; border: 3px solid #444; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
        button { padding: 10px 20px; font-size: 16px; margin: 5px; background: #4CAF50; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="wrapper">
        <canvas id="pong"></canvas>
        <div id="overlay">
            <h1 id="menu-title" style="color:#4CAF50; margin-bottom:20px;">PING PONG AI</h1>
            <div class="row" id="diff-row">
                <button onclick="setDiff(0.04, 4)">EASY</button>
                <button onclick="setDiff(0.08, 6)" style="background:#ff9800">MED</button>
                <button onclick="setDiff(0.15, 8.5)" style="background:#f44336">HARD</button>
            </div>
            <button id="main-action" style="display:none; background:#fff; color:#000;">START GAME</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById('pong');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const menuTitle = document.getElementById('menu-title');
    const mainActionBtn = document.getElementById('main-action');

    canvas.width = 600; canvas.height = 400;

    let user = { x: 10, y: 150, w: 12, h: 80, score: 0, color: '#FFF' };
    let ai = { x: 578, y: 150, w: 12, h: 80, score: 0, color: '#FFF' };
    let ball = { x: 300, y: 200, r: 8, speed: 5, vx: 5, vy: 5, color: '#4CAF50' };
    
    let aiLevel = 0.08; // Lerp tracking setting
    let maxSpeed = 6;
    let running = false;

    function setDiff(lerp, topSpeed) {
        aiLevel = lerp; maxSpeed = topSpeed;
        document.getElementById('diff-row').style.display = 'none';
        mainActionBtn.style.display = 'block';
        initGame();
    }

    function initGame() {
        user.score = 0; ai.score = 0;
        resetBall();
        overlay.style.display = 'none';
        running = true;
    }

    function resetBall() {
        ball.x = canvas.width / 2;
        ball.y = canvas.height / 2;
        ball.vx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
        ball.vy = (Math.random() > 0.5 ? 1 : -1) * (ball.speed * 0.7);
    }

    function collision(b, p) {
        return b.x - b.r < p.x + p.w && b.x + b.r > p.x && b.y - b.r < p.y + p.h && b.y + b.r > p.y;
    }

    function update() {
        ball.x += ball.vx; ball.y += ball.vy;

        // Simple wall bounces
        if (ball.y - ball.r < 0 || ball.y + ball.r > canvas.height) {
            ball.vy = -ball.vy;
        }

        // AI logical interpolator tracking
        ai.y += (ball.y - (ai.y + ai.h / 2)) * aiLevel;
        if(ai.y < 0) ai.y = 0; if(ai.y + ai.h > canvas.height) ai.y = canvas.height - ai.h;

        let playerType = (ball.x + ball.r < canvas.width / 2) ? user : ai;

        if (collision(ball, playerType)) {
            let collidePoint = (ball.y - (playerType.y + playerType.h/2)) / (playerType.h/2);
            let angleRad = (Math.PI/4) * collidePoint;
            let direction = (ball.x + ball.r < canvas.width/2) ? 1 : -1;
            
            ball.vx = direction * ball.speed * Math.cos(angleRad);
            ball.vy = ball.speed * Math.sin(angleRad);
            if(ball.speed < maxSpeed) ball.speed += 0.3;
        }

        // Scoring tracks
        if (ball.x - ball.r < 0) { ai.score++; resetBall(); checkEnd(); } 
        else if (ball.x + ball.r > canvas.width) { user.score++; resetBall(); checkEnd(); }
    }

    function checkEnd() {
        if (user.score >= 5 || ai.score >= 5) {
            running = false;
            menuTitle.innerText = user.score >= 5 ? "YOU WIN! 🏆" : "AI WINS 🤖";
            document.getElementById('diff-row').style.display = 'flex';
            mainActionBtn.style.display = 'none';
            overlay.style.display = 'flex';
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Net layout lines
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.setLineDash([10, 10]);
        ctx.beginPath(); ctx.moveTo(canvas.width/2, 0); ctx.lineTo(canvas.width/2, canvas.height); ctx.stroke();
        ctx.setLineDash([]);

        // Text scores
        ctx.fillStyle = '#FFF'; ctx.font = '32px monospace';
        ctx.fillText(user.score, canvas.width/4, 50);
        ctx.fillText(ai.score, (3*canvas.width)/4, 50);

        // Render entities
        ctx.fillStyle = user.color; ctx.fillRect(user.x, user.y, user.w, user.h);
        ctx.fillStyle = ai.color; ctx.fillRect(ai.x, ai.y, ai.w, ai.h);
        
        ctx.fillStyle = ball.color; ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
    }

    function loop() { if (running) { update(); draw(); } requestAnimationFrame(loop); }
    requestAnimationFrame(loop);

    // Direct touch controller handlers mapping Y coordinate systems directly
    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        let rect = canvas.getBoundingClientRect();
        let scaleY = canvas.height / rect.height;
        let touchY = (e.touches[0].clientY - rect.top) * scaleY;
        user.y = touchY - user.h / 2;
        if(user.y < 0) user.y = 0; if(user.y + user.h > canvas.height) user.y = canvas.height - user.h;
    });

    // Keyboard bindings hookups
    document.addEventListener('keydown', e => {
        if(e.key === 'ArrowUp') user.y = Math.max(0, user.y - 25);
        if(e.key === 'ArrowDown') user.y = Math.min(canvas.height - user.h, user.y + 25);
    });
</script>
</body>
</html>
