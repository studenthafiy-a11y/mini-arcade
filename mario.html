<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Platformer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #000; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; position: relative; }
        #canvas-wrap { position: relative; width: 100%; max-width: 640px; aspect-ratio: 16/9; background: #000; }
        canvas { width: 100%; height: 100%; display: block; background: #5c94fc; border: 2px solid #fff; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
        button { padding: 12px 24px; font-size: 18px; font-weight:bold; background:#ff3d00; color:#fff; border:none; border-radius:4px; cursor:pointer; }
        #ui-bar { position: absolute; top: 10px; left: 10px; font-size: 16px; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
        #ctrl-panel { width: 100%; max-width: 640px; display: flex; justify-content: space-between; padding: 10px; background: #222; }
        .d-pad { display: flex; gap: 10px; }
        .btn { width: 65px; height: 50px; background: #444; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; color:#fff; }
        .btn:active { background: #ff3d00; }
    </style>
</head>
<body>

    <!-- BACK TO MENU BUTTON -->
    <a href="index.html" style="position: absolute; top: 10px; right: 10px; background: #ff3d00; color: #fff; padding: 8px 12px; text-decoration: none; font-family: sans-serif; font-weight: bold; border-radius: 5px; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.8);">⬅ MENU</a>

    <div id="canvas-wrap">
        <div id="ui-bar">COINS: <span id="coin-score">0</span> / 10</div>
        <canvas id="game"></canvas>
        <div id="overlay">
            <h1 id="msg" style="margin-bottom:20px; color:#ff3d00;">SUPER RUNNER</h1>
            <button id="btn-action">START GAME</button>
        </div>
    </div>

    <div id="ctrl-panel">
        <div class="d-pad">
            <div class="btn" id="left-btn">◀</div>
            <div class="btn" id="right-btn">▶</div>
        </div>
        <div class="btn" id="jump-btn">JUMP</div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const coinScoreEl = document.getElementById('coin-score');
    const overlay = document.getElementById('overlay');
    const msgEl = document.getElementById('msg');
    const actionBtn = document.getElementById('btn-action');

    canvas.width = 640;
    canvas.height = 360;

    let player, platforms, coins, enemies, cameraX;
    let score = 0, running = false;
    let keys = { left: false, right: false, jump: false };

    class Player {
        constructor() {
            this.x = 50; this.y = 200; this.w = 20; this.h = 30;
            this.vx = 0; this.vy = 0; this.speed = 4;
            this.gravity = 0.5; this.jumpForce = -10;
            this.grounded = false;
        }
        update() {
            if (keys.left) this.vx = -this.speed;
            else if (keys.right) this.vx = this.speed;
            else this.vx = 0;

            this.vy += this.gravity;
            this.x += this.vx;
            this.y += this.vy;
            this.grounded = false;

            if (this.x < 0) this.x = 0;
            if (this.y > canvas.height + 50) return false;
            return true;
        }
        draw() {
            ctx.fillStyle = '#ff3d00';
            ctx.fillRect(this.x - cameraX, this.y, this.w, this.h);
        }
    }

    function initGame() {
        player = new Player();
        cameraX = 0;
        score = 0;
        coinScoreEl.innerText = score;

        platforms = [
            {x: 0, y: 320, w: 400, h: 40},
            {x: 500, y: 280, w: 200, h: 80},
            {x: 750, y: 220, w: 150, h: 20},
            {x: 950, y: 280, w: 300, h: 80},
            {x: 1350, y: 320, w: 500, h: 40}
        ];

        coins = [
            {x: 150, y: 280, collected: false}, {x: 250, y: 280, collected: false},
            {x: 550, y: 220, collected: false}, {x: 620, y: 220, collected: false},
            {x: 800, y: 160, collected: false}, {x: 1050, y: 220, collected: false},
            {x: 1150, y: 220, collected: false}, {x: 1450, y: 260, collected: false}
        ];

        enemies = [
            {x: 600, y: 256, w: 24, h: 24, vx: -1.5, minX: 510, maxX: 680},
            {x: 1100, y: 256, w: 24, h: 24, vx: -2, minX: 960, maxX: 1220}
        ];

        overlay.style.display = 'none';
        running = true;
        gameLoop();
    }

    function checkCollisions() {
        platforms.forEach(p => {
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                
                let overlapX = Math.min(player.x + player.w - p.x, p.x + p.w - player.x);
                let overlapY = Math.min(player.y + player.h - p.y, p.y + p.h - player.y);

                if (overlapX > overlapY) {
                    if (player.vy > 0 && player.y + player.h - player.vy <= p.y + 2) {
                        player.y -= overlapY; player.vy = 0; player.grounded = true;
                    } else if (player.vy < 0) {
                        player.y += overlapY; player.vy = 0;
                    }
                } else {
                    player.x += (player.vx > 0) ? -overlapX : overlapX;
                }
            }
        });

        coins.forEach(c => {
            if (!c.collected && player.x < c.x + 15 && player.x + player.w > c.x &&
                player.y < c.y + 15 && player.y + player.h > c.y) {
                c.collected = true; score++; coinScoreEl.innerText = score;
            }
        });

        enemies.forEach(e => {
            if (player.x < e.x + e.w && player.x + player.w > e.x &&
                player.y < e.y + e.h && player.y + player.h > e.y) {
                if (player.vy > 0 && player.y + player.h - player.vy <= e.y + 10) {
                    player.vy = -6; e.x = -9999; 
                } else { running = false; triggerEnd(false); }
            }
        });

        if (player.x > 1700) { running = false; triggerEnd(true); }
    }

    function triggerEnd(isWin) {
        msgEl.innerText = isWin ? "YOU WIN! 🎉" : "GAME OVER 💀";
        actionBtn.innerText = "TRY AGAIN";
        overlay.style.display = 'flex';
    }

    function update() {
        if (!player.update()) { running = false; triggerEnd(false); return; }

        cameraX = player.x - 150;
        if (cameraX < 0) cameraX = 0;

        enemies.forEach(e => {
            e.x += e.vx;
            if(e.x < e.minX || e.x > e.maxX) e.vx *= -1;
        });

        checkCollisions();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#4a82e8'; ctx.fillRect(0, 280, canvas.width, canvas.height);

        ctx.fillStyle = '#73bf24';
        platforms.forEach(p => {
            ctx.fillRect(p.x - cameraX, p.y, p.w, p.h);
            ctx.fillStyle = '#8c5211'; ctx.fillRect(p.x - cameraX, p.y + 10, p.w, p.h - 10);
            ctx.fillStyle = '#73bf24';
        });

        ctx.fillStyle = '#ffea00';
        coins.forEach(c => { if(!c.collected) ctx.fillRect(c.x - cameraX, c.y, 12, 12); });

        ctx.fillStyle = '#1b5e20';
        enemies.forEach(e => { if(e.x > 0) ctx.fillRect(e.x - cameraX, e.y, e.w, e.h); });

        player.draw();
    }

    function gameLoop() {
        if (!running) return;
        update(); draw(); requestAnimationFrame(gameLoop);
    }

    actionBtn.addEventListener('click', initGame);

    const bindTouch = (id, keyState) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[keyState] = true; if(keyState==='jump' && player.grounded) player.vy = player.jumpForce; });
        el.addEventListener('touchend', (e) => { e.preventDefault(); keys[keyState] = false; });
    };
    bindTouch('left-btn', 'left'); bindTouch('right-btn', 'right'); bindTouch('jump-btn', 'jump');

    document.addEventListener('keydown', e => {
        if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
        if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        if((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && player.grounded) player.vy = player.jumpForce;
    });
    document.addEventListener('keyup', e => {
        if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
        if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
    });
</script>
</body>
</html>
