<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Slugger</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background: #111; color: #fff; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; position: relative; }
        #game-wrap { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; }
        canvas { width: 100%; height: 100%; display: block; border: 3px solid #555; background: #2c3e50; }
        #overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
        button { padding: 12px 24px; font-size: 18px; font-weight:bold; background:#e74c3c; color:#fff; border:none; border-radius:4px; cursor:pointer; margin-top: 10px; }
        #ui { position: absolute; top: 10px; left: 15px; font-size: 18px; font-weight: bold; color: #ecf0f1; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        #controls { width: 100%; max-width: 800px; display: flex; justify-content: space-between; padding: 10px; background: #222; }
        .d-pad, .action-btns { display: flex; gap: 10px; }
        .btn { width: 70px; height: 60px; background: #444; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: bold; color:#fff; }
        .btn:active { background: #e74c3c; }
    </style>
</head>
<body>

    <a href="index.html" style="position: absolute; top: 10px; right: 10px; background: #e74c3c; color: #fff; padding: 8px 12px; text-decoration: none; font-weight: bold; border-radius: 5px; z-index: 1000;">⬅ MENU</a>

    <div id="game-wrap">
        <div id="ui">SCORE: <span id="score">0</span> | LEVEL: <span id="level">1</span></div>
        <canvas id="game"></canvas>
        <div id="overlay">
            <h1 id="msg" style="color:#e74c3c; margin-bottom:10px;">METAL SLUGGER</h1>
            <button id="btn-start">START MISSION</button>
        </div>
    </div>

    <div id="controls">
        <div class="d-pad">
            <div class="btn" id="btn-left">◀</div>
            <div class="btn" id="btn-right">▶</div>
        </div>
        <div class="action-btns">
            <div class="btn" id="btn-jump" style="background:#3498db;">▲</div>
            <div class="btn" id="btn-fire" style="background:#e67e22;">🔥</div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 800; canvas.height = 450;

    let player, bullets, enemies;
    let score = 0, level = 1, running = false, frameCount = 0;
    let keys = { left: false, right: false };

    let audioCtx = null;
    function initAudio() {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if(audioCtx.state === 'suspended') audioCtx.resume();
    }
    function playSfx(type) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        let now = audioCtx.currentTime;
        o.connect(g); g.connect(audioCtx.destination);
        if (type === 'shoot') {
            o.type = 'square'; o.frequency.setValueAtTime(800, now); o.frequency.exponentialRampToValueAtTime(300, now + 0.1);
            g.gain.setValueAtTime(0.1, now); g.gain.linearRampToValueAtTime(0.01, now + 0.1);
            o.start(now); o.stop(now + 0.1);
        } else if (type === 'boom') {
            o.type = 'sawtooth'; o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(40, now + 0.2);
            g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0.01, now + 0.2);
            o.start(now); o.stop(now + 0.2);
        } else if (type === 'jump') {
            o.type = 'triangle'; o.frequency.setValueAtTime(200, now); o.frequency.linearRampToValueAtTime(400, now + 0.15);
            g.gain.setValueAtTime(0.15, now); g.gain.linearRampToValueAtTime(0.01, now + 0.15);
            o.start(now); o.stop(now + 0.15);
        } else if (type === 'level') {
            o.type = 'sine'; o.frequency.setValueAtTime(440, now); o.frequency.setValueAtTime(659, now + 0.1); o.frequency.setValueAtTime(880, now + 0.2);
            g.gain.setValueAtTime(0.2, now); g.gain.linearRampToValueAtTime(0.01, now + 0.5);
            o.start(now); o.stop(now + 0.5);
        }
    }

    class Player {
        constructor() {
            this.w = 30; this.h = 50; this.x = 100; this.y = 350 - this.h;
            this.vy = 0; this.speed = 5; this.grounded = true;
        }
        update() {
            if (keys.left) this.x -= this.speed;
            if (keys.right) this.x += this.speed;
            this.vy += 0.6; this.y += this.vy;
            if (this.y >= 350 - this.h) { this.y = 350 - this.h; this.vy = 0; this.grounded = true; }
            if (this.x < 0) this.x = 0; if (this.x > canvas.width - this.w) this.x = canvas.width - this.w;
        }
        draw() {
            ctx.fillStyle = '#ecf0f1'; ctx.fillRect(this.x, this.y, this.w, this.h); 
            ctx.fillStyle = '#f1c40f'; ctx.fillRect(this.x + 10, this.y + 15, 25, 8); // Adjusted gun placement
        }
        jump() { if (this.grounded) { this.vy = -12; this.grounded = false; playSfx('jump'); } }
        shoot() { bullets.push({x: this.x + 35, y: this.y + 15, w: 15, h: 8, vx: 12}); playSfx('shoot'); }
    }

    function initGame() {
        initAudio(); player = new Player(); bullets = []; enemies = [];
        score = 0; level = 1; frameCount = 0; running = true;
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = level;
        document.getElementById('overlay').style.display = 'none';
        loop();
    }

    function update() {
        player.update(); frameCount++;
        
        let spawnRate = Math.max(30, 90 - (level * 10));
        if (frameCount % spawnRate === 0) {
            let speed = 3 + (level * 0.5);
            enemies.push({ x: canvas.width, y: 350 - 40, w: 30, h: 40, vx: -speed });
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].x += bullets[i].vx;
            if (bullets[i].x > canvas.width) bullets.splice(i, 1);
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i]; e.x += e.vx;
            if (e.x < -e.w) enemies.splice(i, 1);
            else if (player.x < e.x + e.w && player.x + player.w > e.x && player.y < e.y + e.h && player.y + player.h > e.y) {
                gameOver();
            }
        }

        // RE-ENGINEERED COMPREHENSIVE COLLISION SYSTEM
        for (let i = bullets.length - 1; i >= 0; i--) {
            for (let j = enemies.length - 1; j >= 0; j--) {
                let b = bullets[i], e = enemies[j];
                
                if (b && e) {
                    // Generous overlapping bounds check
                    let bulletRight = b.x + b.w;
                    let bulletBottom = b.y + b.h;
                    let enemyRight = e.x + e.w;
                    let enemyBottom = e.y + e.h;

                    if (b.x < enemyRight && bulletRight > e.x && b.y < enemyBottom && bulletBottom > e.y) {
                        playSfx('boom'); 
                        bullets.splice(i, 1); 
                        enemies.splice(j, 1);
                        score += 10; 
                        document.getElementById('score').innerText = score;
                        if (score > 0 && score % 100 === 0) { 
                            level++; 
                            playSfx('level'); 
                            document.getElementById('level').innerText = level; 
                        }
                        break;
                    }
                }
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#27ae60'; ctx.fillRect(0, 350, canvas.width, 100); // Ground
        player.draw();
        ctx.fillStyle = '#f1c40f'; bullets.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));
        ctx.fillStyle = '#e74c3c'; enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));
    }

    function loop() { if (!running) return; update(); draw(); requestAnimationFrame(loop); }
    function gameOver() { running = false; document.getElementById('msg').innerText = "KIA. TRY AGAIN."; document.getElementById('overlay').style.display = 'flex'; }

    const bindControl = (id, key, state) => {
        const el = document.getElementById(id);
        el.addEventListener('touchstart', e => { e.preventDefault(); if(key==='jump') player.jump(); else if(key==='fire') player.shoot(); else keys[key] = state; });
        el.addEventListener('touchend', e => { e.preventDefault(); if(key!=='jump' && key!=='fire') keys[key] = !state; });
        el.addEventListener('mousedown', e => { if(key==='jump') player.jump(); else if(key==='fire') player.shoot(); else keys[key] = state; });
        el.addEventListener('mouseup', e => { if(key!=='jump' && key!=='fire') keys[key] = !state; });
    };
    bindControl('btn-left', 'left', true); bindControl('btn-right', 'right', true);
    bindControl('btn-jump', 'jump', true); bindControl('btn-fire', 'fire', true);

    document.getElementById('btn-start').addEventListener('click', initGame);
    document.getElementById('btn-start').addEventListener('touchstart', e => { e.preventDefault(); initGame(); });

    document.addEventListener('keydown', e => {
        if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
        if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
        if(e.key === 'ArrowUp' || e.key === 'w') player.jump();
        if(e.key === ' ' || e.key === 'Shift') { if(!keys.fireLock) { player.shoot(); keys.fireLock = true; } }
    });
    document.addEventListener('keyup', e => {
        if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
        if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
        if(e.key === ' ' || e.key === 'Shift') keys.fireLock = false;
    });
</script>
</body>
</html>
